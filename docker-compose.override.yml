# Docker Compose Override for Local Development
# This file automatically overrides docker-compose.yml settings when running locally
# Use this for development-specific configurations like hot reload and debugging

services:
  # Frontend overrides for local development
  frontend:
    environment:
      # Override API URL for local development
      - VITE_API_URL=http://localhost:8000
      - VITE_ENV=development
      - NODE_ENV=development
      - VITE_LOG_LEVEL=debug
      - VITE_ENABLE_DARK_MODE=true
      - VITE_ENABLE_SOCIAL_FEATURES=true
    ports:
      - "3000:3000"

  # Backend API overrides for local development
  backend-api:
    environment:
      # Development environment variables
      - DEBUG=true
      - LOG_LEVEL=DEBUG
      - HOT_RELOAD=true
      - ENABLE_REQUEST_LOGGING=true
      - ENABLE_METRICS=true
      # Override endpoints for local access
      - DYNAMODB_ENDPOINT=http://dynamodb-local:8000
      # BEDROCK_ENDPOINT - empty to use real AWS Bedrock (not LocalStack)
      - BEDROCK_ENDPOINT=
      # CORS for local frontend
      - CORS_ORIGINS=http://localhost:3000,http://localhost:5173
      # Python path
      - PYTHONPATH=/app
      # AWS credentials from .env for ap-south-1 (India)
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_REGION=${AWS_REGION}
    volumes:
      # Enable hot reload by mounting source code
      - ./backend/api:/app
      - ./backend/src:/app/src
      - ./backend/services:/app/services
      - ./backend/prompts:/app/prompts
      # Mount logs for easy access
      - ./logs:/app/logs
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload --log-level debug

  # Backend handlers overrides for local development
  backend-handlers:
    environment:
      - DEBUG=true
      - LOG_LEVEL=DEBUG
      - PYTHONPATH=/app:/app/src
      # AWS credentials from .env
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_REGION=${AWS_REGION}
    volumes:
      # Enable hot reload by mounting source code
      - ./backend/handlers:/app
      - ./backend/src:/app/src
      - ./backend/services:/app/services
      - ./backend/prompts:/app/prompts
      - ./logs:/app/logs

  # Backend services overrides for local development
  backend-services:
    environment:
      - DEBUG=true
      - LOG_LEVEL=DEBUG
      - PYTHONPATH=/app:/app/src
    volumes:
      # Enable hot reload by mounting source code
      - ./backend/services:/app
      - ./backend/src:/app/src
      - ./logs:/app/logs

  # DynamoDB Local overrides for local development
  dynamodb-local:
    ports:
      # Expose DynamoDB Local on host for direct access
      - "8001:8000"
    command: "-jar DynamoDBLocal.jar -sharedDb -inMemory"

  # LocalStack overrides for local development
  localstack:
    environment:
      - DEBUG=1
      - LOG_LEVEL=debug
      - SERVICES=bedrock,sts,iam
    ports:
      # Expose LocalStack on host for direct access
      - "4566:4566"
      - "4571:4571"

  # DynamoDB initializer overrides
  dynamodb-init:
    environment:
      - LOG_LEVEL=DEBUG
    volumes:
      # Mount scripts for easy editing
      - ./backend/scripts:/app
