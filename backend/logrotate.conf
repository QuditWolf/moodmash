# Log rotation configuration for VibeGraph backend
# This file configures automatic log rotation to prevent disk space issues

/app/logs/*.log {
    # Rotate daily
    daily
    
    # Keep 30 days of logs
    rotate 30
    
    # Compress old logs
    compress
    delaycompress
    
    # Don't error if log file is missing
    missingok
    
    # Don't rotate if log is empty
    notifempty
    
    # Create new log file with these permissions
    create 0644 root root
    
    # Use date as suffix for rotated files
    dateext
    dateformat -%Y%m%d
    
    # Maximum size before rotation (100MB)
    size 100M
    
    # Post-rotation script (optional)
    # postrotate
    #     # Send signal to application to reopen log files
    #     /usr/bin/killall -SIGUSR1 uvicorn
    # endscript
}
